<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<!-- CSS -->
		<link rel="stylesheet" href="login.css" />
		<!-- FAVICON -->
		<link rel="shortcut icon" href="favicon.png" type="image/x-icon" />
		<title>Simple Login Page</title>
	</head>
	<body>
		<div class="mainLogin">
			<div class="leftLogin">
				<h1>
					Ma Voix.CI<br />
				</h1>
				<p>votre voie compte, pour le choix de votre candidat</p>
				<img
					src="/images/RITUEL POUR REMPORTER UNE ELECTION (1).jfif"
					class="leftLoginImage"
					alt="Uma pessoa no pc"
				/>
			</div>
			<div class="rightLogin">
				<div class="cardLogin">
					<img src="images/Profile Icon Silhouette PNG Transparent, Avatar Icon Profile Icon Member Login Vector Isolated, Login Icons, Profile Icons, Avatar Icons PNG Image For Free Download.jfif" alt="" />
					<div class="textfield" id="divUser">
						<label for="user">Email</label>
						<input
							type="email"
							name="email"
                            id="email"
							placeholder="Entrez votre Email"
						/>
					</div>
					<div class="textfield" id="divPass">
						<label for="password">Mot de passe</label>
						<input
							type="password"
							name="password"
                            id="password"
							placeholder="Entrez votre mot de passe"
						/>
					</div>
					<button class="btnLogin" onclick="logar()">
						Se connecter
					</button>
				</div>
			</div>
		</div>
		<script src="login.js"></script>
	</body>
</html>
